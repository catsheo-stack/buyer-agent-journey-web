<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Soft abstract wealth landscape</title>
  <desc id="desc">A calm blue-grey architectural landscape with mist, flowing contours and a warm sunrise glow.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#31475f"/>
      <stop offset="0.48" stop-color="#536d83"/>
      <stop offset="1" stop-color="#8da0ab"/>
    </linearGradient>
    <radialGradient id="glow" cx="76%" cy="20%" r="44%">
      <stop offset="0" stop-color="#f5dfae" stop-opacity="0.68"/>
      <stop offset="0.4" stop-color="#d7c18f" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#d7c18f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ridge1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#71869a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#b6c1c6" stop-opacity="0.26"/>
    </linearGradient>
    <linearGradient id="ridge2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#263c52" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#61798c" stop-opacity="0.56"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="28"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <ellipse cx="1420" cy="250" rx="360" ry="190" fill="#f2deb2" opacity="0.13" filter="url(#blur)"/>
  <path d="M0 680 C230 590 430 620 650 540 C900 450 1110 535 1320 470 C1550 395 1710 455 1920 390 L1920 1080 L0 1080 Z" fill="url(#ridge1)"/>
  <path d="M0 800 C260 710 500 760 760 650 C1010 545 1240 655 1490 560 C1670 495 1810 520 1920 480 L1920 1080 L0 1080 Z" fill="url(#ridge2)"/>
  <path d="M0 920 C260 850 520 885 790 800 C1070 710 1370 820 1610 735 C1770 680 1860 690 1920 670 L1920 1080 L0 1080 Z" fill="#1f3448" opacity="0.82"/>
  <g opacity="0.22" fill="none" stroke="#f2dfb3" stroke-width="2">
    <path d="M180 240 C520 150 740 190 1030 120 C1320 55 1560 110 1770 55"/>
    <path d="M120 305 C470 220 760 250 1080 180 C1350 120 1600 150 1830 110"/>
